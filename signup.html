<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signupstyle.css">
</head>
<body>
<header>
    <h2>GateKeeper</h2>

    <nav>
        <a href="home.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
    </nav>
</header> 
<div class="signup-container">
    <h2>Sign Up</h2>
    <form onsubmit="saveUser(event)">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Username
            </label>
            <input type="text" placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Create a password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm your password" required>
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <p class="extra">Already have an account? <a href="login.html">Login</a></p>
</div>
<script>

function saveUser(event) {

    event.preventDefault();

    let fullName = document.querySelectorAll("input")[0].value;
    let username = document.querySelectorAll("input")[1].value;
    let password = document.querySelectorAll("input")[2].value;
    let confirmPassword = document.querySelectorAll("input")[3].value;

    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }


    localStorage.setItem("username", username);
    localStorage.setItem("password", password);


    let logs = JSON.parse(localStorage.getItem("logs")) || [];

    logs.push({
        user: username,
        action: "Signup",
        status: "Success",
        time: new Date().toLocaleString()
    });

    localStorage.setItem("logs", JSON.stringify(logs));

    alert("Signup Successful!");

    window.location.href = "login.html";
}

</script>
</body>
</html>
