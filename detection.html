<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detection Dashboard</title>

    <style>
        header {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);

        width: 85%;
        padding: 15px 40px;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);

        border-radius: 15px;

        display: flex;
        justify-content: space-between;
        align-items: center;

        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        nav a {
        margin-left: 25px;
        text-decoration: none;
        color: white;
        font-size: 18px;
        transition: 0.3s;
        }

        nav a:hover {
            color: wheat;
        }
        body{
            font-family: "Times New Roman";
            background: #111827;
            color: white;
            padding: 30px;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th{
            background: #4facfe;
            color: white;
        }

        .success{
            color: green;
            font-weight: bold;
        }

        .failed{
            color: red;
            font-weight: bold;
        }

    </style>

</head>
<body>
<header>
    <div class="logo">GateKeeper</div>

    <nav>
        <a href="home.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <a href="detection.html">Dashboard</a>
    </nav>
</header>
<br><br><br><br>
    <h1>GateKeeper Detection Dashboard</h1>

    <table>

        <thead>

            <tr>
                <th>Username</th>
                <th>Action</th>
                <th>Status</th>
                <th>Time</th>
            </tr>

        </thead>

        <tbody id="tableBody">

        </tbody>

    </table>

<script>

let logs = JSON.parse(localStorage.getItem("logs")) || [];

let tableBody = document.getElementById("tableBody");

logs.forEach(log => {

    let row = document.createElement("tr");

    row.innerHTML = `

        <td>${log.user}</td>

        <td>${log.action}</td>

        <td class="${log.status === 'Failed' ? 'failed' : 'success'}">
            ${log.status}
        </td>

        <td>${log.time}</td>

    `;

    tableBody.appendChild(row);

});

</script>

</body>
</html>
